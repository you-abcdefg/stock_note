name: Rails CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Deploy
      env:
        PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        USER_NAME: ${{ secrets.USER_NAME }}
        HOST_NAME: ${{ secrets.HOST_NAME }}
      run: |
        set -euo pipefail
        echo "$PRIVATE_KEY" > private_key && chmod 600 private_key
        ssh -o StrictHostKeyChecking=no -i private_key ${USER_NAME}@${HOST_NAME} '
          set -euo pipefail

          if [ -d "$HOME/stock_note/.git" ]; then
            APP_DIR="$HOME/stock_note"
          elif [ -d "$HOME/environment/stock_note/.git" ]; then
            APP_DIR="$HOME/environment/stock_note"
          else
            echo "stock_note の配置先が見つかりません。"
            exit 1
          fi

          cd "$APP_DIR"
          git fetch origin main
          git reset --hard origin/main

          if [ -s "$HOME/.nvm/nvm.sh" ]; then
            . "$HOME/.nvm/nvm.sh"
            nvm install 20
            nvm use 20
          fi

          node -v
          NODE_MAJOR=$(node -p "process.versions.node.split(\".\")[0]")
          if [ "$NODE_MAJOR" -lt 20 ]; then
            echo "Node.js 20+ が必要です。現在: $(node -v)"
            exit 1
          fi

          ~/.rbenv/shims/bundle install
          NODE_OPTIONS=--openssl-legacy-provider ~/.rbenv/shims/bundle exec rails assets:precompile RAILS_ENV=production
          ~/.rbenv/shims/bundle exec rails db:migrate RAILS_ENV=production

          if [[ -e tmp/pids/puma.state ]]; then
            ~/.rbenv/shims/bundle exec pumactl -S tmp/pids/puma.state stop || true
          fi
          pkill -f "puma.*stock_note" || true
          sleep 2

          RAILS_ENV=production ~/.rbenv/shims/bundle exec puma -d -e production -C config/puma.rb
          pgrep -af puma || true
          echo "puma started in daemon mode"
        '